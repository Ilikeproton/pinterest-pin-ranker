<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PinPulse Starting</title>
  <link href="/static/style.css" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --startup-panel: rgba(255, 248, 238, 0.78);
      --startup-border: rgba(38, 42, 47, 0.08);
      --startup-warm-soft: rgba(210, 110, 75, 0.18);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 18% 22%, rgba(243, 196, 158, 0.9), transparent 34%),
        radial-gradient(circle at 84% 16%, rgba(125, 190, 173, 0.55), transparent 30%),
        linear-gradient(180deg, #f9f2e7 0%, #f1ebe2 52%, #ebe4d9 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 38vw;
      height: 38vw;
      border-radius: 999px;
      filter: blur(12px);
      opacity: 0.72;
      pointer-events: none;
    }

    body::before {
      left: -10vw;
      bottom: -12vw;
      background: radial-gradient(circle, rgba(214, 124, 83, 0.26), transparent 66%);
    }

    body::after {
      right: -8vw;
      top: -10vw;
      background: radial-gradient(circle, rgba(46, 122, 109, 0.18), transparent 64%);
    }

    .startup-stage {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .startup-panel {
      width: min(460px, 100%);
      border-radius: 28px;
      padding: 30px;
      border: 1px solid var(--startup-border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), var(--startup-panel));
      box-shadow:
        0 22px 70px rgba(95, 82, 63, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
    }

    .startup-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .startup-brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--accent), #efb37f);
      box-shadow: 0 16px 28px rgba(210, 110, 75, 0.26);
      position: relative;
    }

    .startup-brand-mark::before,
    .startup-brand-mark::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
    }

    .startup-brand-mark::before {
      width: 15px;
      height: 15px;
      left: 9px;
      top: 9px;
    }

    .startup-brand-mark::after {
      width: 9px;
      height: 9px;
      right: 8px;
      bottom: 8px;
    }

    .startup-title {
      margin: 0;
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .startup-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .startup-meter {
      margin-top: 24px;
      border-radius: 999px;
      height: 10px;
      background: rgba(31, 39, 49, 0.08);
      overflow: hidden;
    }

    .startup-meter-fill {
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #efbe7d, var(--teal));
      animation: startupDrift 1.4s ease-in-out infinite;
      transform-origin: left center;
      box-shadow: 0 0 24px rgba(210, 110, 75, 0.24);
    }

    .startup-status-row {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .startup-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--startup-warm-soft);
      color: #a35538;
      font-weight: 700;
    }

    .startup-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 5px rgba(210, 110, 75, 0.14);
    }

    @keyframes startupDrift {
      0% { transform: scaleX(0.58); }
      50% { transform: scaleX(1); }
      100% { transform: scaleX(0.7); }
    }

    @media (max-width: 720px) {
      .startup-panel {
        padding: 24px;
      }

      .startup-status-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="startup-stage">
    <section class="startup-panel">
      <div class="startup-brand">
        <div class="startup-brand-mark" aria-hidden="true"></div>
        <div>
          <p class="eyebrow" data-i18n="startup.eyebrow">Desktop Workspace</p>
          <h1 class="startup-title">PinPulse</h1>
        </div>
      </div>

      <p class="startup-copy" data-i18n="startup.copy">
        Initializing the local database, scheduler, and embedded interface before entering the Pinterest heat collection workspace.
      </p>

      <div class="startup-meter" aria-hidden="true">
        <div class="startup-meter-fill"></div>
      </div>

      <div class="startup-status-row">
        <span id="statusText">Waking up the workspace...</span>
        <span class="startup-badge" data-i18n="startup.badge">Local-first</span>
      </div>
    </section>
  </div>

  <script src="/static/i18n.js"></script>
  <script src="/static/common.js"></script>
  <script src="/static/startup.js"></script>
</body>
</html>
